plugins {
    id 'java'
}

group 'org.example'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation group: 'org.testng', name: 'testng', version: '7.9.0'
    testImplementation group: 'io.appium', name: 'java-client', version: '9.4.0'
    testImplementation group: 'org.json', name: 'json', version: '20090211'
    testImplementation 'com.google.code.gson:gson:2.11.0'
}

test {
    useTestNG {
        suites 'src/test/resources/testng.xml'
    }
}
